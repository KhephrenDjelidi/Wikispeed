services:
  frontend:
    build:
      context: ./frontend
    expose:
      - "4173"

  frontend-api:
    build:
      context: ./frontend
    command: ["node", "src/utils/serveur.js"]
    environment:
      API_PORT: "3000"
      API_HOST: "0.0.0.0"
      MONGODB_URI: ${MONGODB_URI:-mongodb+srv://Dylan:Dylan@qdcloud.8xeyc.mongodb.net/?retryWrites=true&w=majority&appName=QDcloud}
    expose:
      - "3000"

  chatserver:
    build:
      context: ./chatserver
    environment:
      WS_PORT: "2025"
    expose:
      - "2025"

  insert:
    build:
      context: ./insert
    environment:
      SOLVER_PORT: "3001"
      SOLVER_HOST: "0.0.0.0"
      MONGODB_URI_SOLVER: ${MONGODB_URI_SOLVER:-mongodb+srv://User:User@qdcloud.8xeyc.mongodb.net/?retryWrites=true&w=majority&appName=QDcloud}
    expose:
      - "3001"

  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - frontend-api
      - chatserver
      - insert
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
