name: Trigger auto deployment for wikispeed-app

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/wikispeed-app-AutoDeployTrigger-582db457-1cc8-4875-8d8e-f4d5d5ce17cf.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.WIKISPEEDAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.WIKISPEEDAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.WIKISPEEDAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: acrwikispeed12345.azurecr.io
          registryUsername: ${{ secrets.WIKISPEEDAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.WIKISPEEDAPP_REGISTRY_PASSWORD }}
          containerAppName: wikispeed-app
          resourceGroup: rg-wikispeed
          imageToBuild: acrwikispeed12345.azurecr.io/wikispeed-app:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


